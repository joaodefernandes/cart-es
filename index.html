<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Offset Stacked Cards</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0a0a0a;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .circulo-central {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #2ecc71 0%, #1b5e20 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            perspective: 1200px;
            box-shadow: 0 0 100px rgba(46, 204, 113, 0.15);
        }

        .card {
            width: 180px;
            height: 260px;
            background: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%);
            border-radius: 15px;
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1);
            cursor: pointer;
            transform-style: preserve-3d;
            /* Sombra suave inicial */
            box-shadow: -5px 10px 30px rgba(0,0,0,0.7);
        }

        /* --- ESTADO INICIAL: EMPILHADOS, AFASTADOS E INCLINADOS (-30deg) --- */
        
        /* Carta de baixo (mais à esquerda/baixo) */
        .card:nth-child(1) { 
            transform: translate(-30px, 30px) rotateZ(-30deg) translateZ(0); 
            z-index: 1;
        }

        /* Carta do meio (deslocada) */
        .card:nth-child(2) { 
            transform: translate(0px, 0px) rotateZ(-30deg) translateZ(30px); 
            z-index: 2;
            /* Sombra projetada na carta 1 */
            box-shadow: -10px 15px 35px rgba(0,0,0,0.8);
        }

        /* Carta do topo (mais à direita/cima) */
        .card:nth-child(3) { 
            transform: translate(30px, -30px) rotateZ(-30deg) translateZ(60px); 
            z-index: 3;
            /* Sombra mais forte para destacar o topo */
            box-shadow: -15px 20px 40px rgba(0,0,0,0.9);
        }

        /* --- AO PASSAR O MOUSE NO CONTAINER: ABRE O LEQUE E VOLTA A 0deg --- */
        
        .circulo-central:hover .card:nth-child(1) {
            transform: translateX(-250px) translateZ(50px) rotateZ(0deg) rotateY(10deg);
        }

        .circulo-central:hover .card:nth-child(2) {
            transform: translateZ(120px) scale(1.1) rotateZ(0deg);
            border-color: #2ecc71;
        }

        .circulo-central:hover .card:nth-child(3) {
            transform: translateX(250px) translateZ(50px) rotateZ(0deg) rotateY(-10deg);
        }

        /* Efeito Individual */
        .card:hover {
            border-color: rgba(46, 204, 113, 1) !important;
            box-shadow: 0 0 50px rgba(46, 204, 113, 0.5) !important;
        }

        .card::after {
            content: '';
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="circulo-central">
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
    </div>

</body>
</html>
